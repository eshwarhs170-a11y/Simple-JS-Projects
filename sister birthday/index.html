<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For the Best Sister Ever! 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-pink: #ff758c;
            --soft-purple: #a18cd1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a18cd1, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #444;
            overflow-x: hidden;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-9/sym833.cur'), auto;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Initial Landing Screen */
        #welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 1s ease;
        }

        .floating-cake {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }

        /* Main Content (Hidden Initially) */
        #main-content {
            display: none;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: white;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.2);
        }

        /* Polaroid Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: rotate(var(--r));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 2px;
        }

        .polaroid img {
            width: 200px;
            height: 250px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) translateY(-20px);
            z-index: 100;
        }

        /* Interactive Heart Game Area */
        .game-container {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin: 40px 0;
            border: 2px dashed white;
        }
        .polaroid {
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 10px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
}
        .heart-box {
            display: inline-block;
            font-size: 3rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        .heart-box:hover { transform: scale(1.3); }

        #message-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d81b60;
            min-height: 40px;
            margin-top: 20px;
        }

        /* Button Styling */
        .btn {
            background: white;
            color: var(--primary-pink);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #fff0f5; transform: translateY(-5px); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <audio id="bdayMusic" loop>
        <source src="birthday-song.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen">
        <div class="floating-cake">🎂</div>
        <h1>Hey Sis, I have a surprise...</h1>
        <button class="btn" onclick="revealMagic()">Open Your Gift! ✨</button>
    </div>

    <div id="main-content">
        <h1>Happy Birthday, Queen! 👑</h1>
        
        <div class="game-container">
            <h3>Pop a heart to see a secret message! 💖</h3>
            <div id="heart-grid">
                </div>
            <div id="message-display">Click a heart!</div>
        </div>

        <div class="gallery">
            <div class="polaroid" style="--r: -3deg;"><img src="photo1.jpg" alt="Sis 1"></div>
            <div class="polaroid" style="--r: 2deg;"><img src="photo2.jpg" alt="Sis 2"></div>
            <div class="polaroid" style="--r: -1deg;"><img src="photo3.jpg" alt="Sis 3"></div>
            <div class="polaroid" style="--r: 4deg;"><img src="photo4.jpg" alt="Sis 4"></div>
        </div>

        <div style="padding-bottom: 50px;">
            <p style="font-size: 1.4rem; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">
                "A sister is a little bit of childhood that can never be lost." <br>
                <b>I love you! 💖</b>
            </p>
        </div>
    </div>

    <script>
        const messages = [
            "You're my Best Friend! 👭",
            "You inspire me every day! ✨",
            "The world is better with you! 🌍",
            "You are so beautiful! 🌸",
            "I'm so lucky to have you! 🍀",
            "Keep shining, sis! 💎",
            "You're the smartest person I know! 🧠",
            "Let's eat lots of cake! 🍰"
        ];

        function revealMagic() {
            // Play Music
            document.getElementById('bdayMusic').play();

            // Transition Screens
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                startConfetti();
            }, 1000);

            // Generate Hearts
            const grid = document.getElementById('heart-grid');
            for(let i=0; i<8; i++) {
                let h = document.createElement('span');
                h.className = 'heart-box';
                h.innerHTML = '💖';
                h.onclick = () => {
                    document.getElementById('message-display').innerText = messages[i];
                    h.style.opacity = '0.3';
                    h.style.pointerEvents = 'none';
                    confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
                };
                grid.appendChild(h);
            }
        }

        function startConfetti() {
            var end = Date.now() + (15 * 1000);
            var colors = ['#ff758c', '#ffffff', '#ffedbc'];

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
