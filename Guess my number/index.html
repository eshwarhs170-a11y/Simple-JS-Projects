<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess my number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Guess my number bro</h1>
        <div id="secret-box">?</div>
        <p id="guess">
            Start Guessing!!!...
        </p>
        <div class="both">

            <input type="number" placeholder="Enter a number" name="number" id="num">
            <button id="check-btn">Check</button>
        </div>
        <div id="score-label">Score:<span id="score">20</span></div>
        <div id="highscore-label">High Score:<span id="highscore">0</span></div>
        <button id="reset-btn">Reset</button>
        <script src="script.js"></script>
    </div>
</body>
</html>
